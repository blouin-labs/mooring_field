---
# Checks — CI gate for PRs targeting staging.
name: Checks

on:
  pull_request:
    branches: [staging]
    paths:
      - 'stacks/**'
      - '.github/workflows/**'
      - '**.md'

jobs:
  changes:
    runs-on: ["self-hosted", "wsl-docker-runner"]
    container:
      image: alpine/git
    outputs:
      stacks: ${{ steps.filter.outputs.stacks }}
      workflows: ${{ steps.filter.outputs.workflows }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            stacks:
              - 'stacks/**'
            workflows:
              - '.github/workflows/**'
            docs:
              - '**.md'

  compose-validate:
    needs: changes
    if: ${{ needs.changes.outputs.stacks == 'true' }}
    runs-on: ["self-hosted", "wsl-docker-runner"]
    container:
      image: docker:cli
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose files
        run: |
          failed=0
          for f in $(find stacks -name 'compose.yaml' -o -name 'docker-compose.yml' | sort); do
            echo "Validating $f ..."
            docker compose -f "$f" config --quiet || { echo "FAILED: $f" >&2; failed=1; }
          done
          exit "$failed"

  hadolint:
    needs: changes
    if: ${{ needs.changes.outputs.stacks == 'true' }}
    runs-on: ["self-hosted", "wsl-docker-runner"]
    container:
      image: hadolint/hadolint:latest-alpine
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles
        run: |
          files=$(find stacks -name 'Dockerfile' | sort)
          if [ -z "$files" ]; then
            echo "No Dockerfiles found — skipping"
            exit 0
          fi
          # shellcheck disable=SC2086
          hadolint $files

  actionlint:
    needs: changes
    if: ${{ needs.changes.outputs.workflows == 'true' }}
    runs-on: ["self-hosted", "wsl-docker-runner"]
    container:
      image: rhysd/actionlint:latest-sc
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        run: actionlint

  vale:
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' }}
    runs-on: ["self-hosted", "wsl-docker-runner"]
    container:
      image: alpine:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: apk add --no-cache github-cli curl

      - name: Install vale
        run: |
          VERSION=$(curl -s https://api.github.com/repos/jdkato/vale/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -sL \
            "https://github.com/jdkato/vale/releases/download/${VERSION}/vale_${VERSION#v}_Linux_64-bit.tar.gz" \
            | tar xz -C /tmp
          mv /tmp/vale /usr/local/bin/vale

      - name: Fetch shared vale config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/blouin-labs/.github/contents/.vale.ini \
            --jq '.content' | base64 -d > .vale.ini

      - name: Run vale
        run: vale --config=.vale.ini .

  gitleaks:
    runs-on: ["self-hosted", "wsl-docker-runner"]
    container:
      image: zricethezav/gitleaks:latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets
        # --no-git: scan working directory files directly (no history walk needed for PRs)
        # --redact: mask secret values in output
        run: gitleaks detect --source . --no-git --redact --exit-code 1

  checkov:
    needs: changes
    if: ${{ needs.changes.outputs.stacks == 'true' }}
    runs-on: ["self-hosted", "wsl-docker-runner"]
    container:
      image: bridgecrew/checkov:latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan compose files for security misconfigurations
        # soft-fail: harden to hard-fail once baseline is clean
        run: checkov -d stacks --framework docker_compose --compact --quiet || true

  all-checks:
    needs: [compose-validate, hadolint, actionlint, vale, gitleaks, checkov]
    if: ${{ always() }}
    runs-on: ["self-hosted", "wsl-docker-runner"]
    container:
      image: alpine:latest
    steps:
      - name: All checks passed
        run: |
          for result in \
            "${{ needs.compose-validate.result }}" \
            "${{ needs.hadolint.result }}" \
            "${{ needs.actionlint.result }}" \
            "${{ needs.vale.result }}" \
            "${{ needs.gitleaks.result }}" \
            "${{ needs.checkov.result }}"; do
            if [ "$result" = "failure" ]; then
              exit 1
            fi
          done
