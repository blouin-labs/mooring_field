---
name: Select Runner

on:
  workflow_call:
    outputs:
      runner:
        description: "JSON array of runner labels to pass to runs-on"
        value: ${{ jobs.select-runner.outputs.runner }}

jobs:
  select-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RUNNER_POLLER_APP_ID }}
          private-key: ${{ secrets.RUNNER_POLLER_APP_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Pick runner
        id: pick
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Fork PRs never run on self-hosted runners — fall back to ubuntu-latest
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo 'runner=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
            echo "::notice::Fork PR — self-hosted runners not available for forks, using ubuntu-latest"
            exit 0
          fi

          wsl_status=$(gh api orgs/${{ github.repository_owner }}/actions/runners \
            --jq '.runners[] | select(.name=="wsl-docker-runner") | .status' 2>/dev/null || echo "")
          docker_status=$(gh api orgs/${{ github.repository_owner }}/actions/runners \
            --jq '.runners[] | select(.name=="harbor-srv-docker") | .status' 2>/dev/null || echo "")

          if [ "$wsl_status" = "online" ]; then
            echo 'runner=["self-hosted","wsl-docker-runner"]' >> "$GITHUB_OUTPUT"
            echo "::notice::wsl-docker-runner online — selected"
          elif [ "$docker_status" = "online" ]; then
            echo 'runner=["self-hosted","harbor-srv-docker"]' >> "$GITHUB_OUTPUT"
            echo "::notice::wsl-docker-runner offline — harbor-srv-docker online — selected"
          else
            echo 'runner=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
            echo "::notice::wsl-docker-runner offline, harbor-srv-docker offline — falling back to ubuntu-latest"
          fi
