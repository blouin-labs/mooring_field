---
name: Promotion

on:
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        type: choice
        default: promote-and-deploy
        options:
          - promote-and-deploy
          - promote
          - deploy
      confirm:
        description: 'Type "ok deploy" to confirm promote-and-deploy or deploy'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'promote' || inputs.action == 'promote-and-deploy' }}
    steps:
      - name: Require confirmation for promote-and-deploy
        if: ${{ inputs.action == 'promote-and-deploy' }}
        run: |
          if [ "${{ inputs.confirm }}" != "ok deploy" ]; then
            echo 'ERROR: type "ok deploy" in the confirm field to proceed' >&2
            exit 1
          fi

      - name: Verify staging build is green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/build.yml/runs?branch=staging&status=success&per_page=1" \
            --jq '.workflow_runs[0].id')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: no successful build.yml run found on staging" >&2
            exit 1
          fi
          echo "Latest successful staging build: run $RUN_ID"

      - name: Fast-forward main to staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api "repos/${{ github.repository }}/git/refs/heads/staging" \
            --jq '.object.sha')
          gh api "repos/${{ github.repository }}/git/refs/heads/main" \
            --method PATCH \
            --field sha="$SHA" \
            --field force=false
          echo "main fast-forwarded to $SHA"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v5
        with:
          ref: staging

      - name: Re-tag all services :staging → :latest
        # No-op if no stacks have a Dockerfile; runs automatically when they do.
        run: |
          find stacks/ -maxdepth 2 -name 'Dockerfile' \
            | sed 's|stacks/||; s|/Dockerfile||' \
            | while read -r service; do
                echo "Re-tagging $service"
                docker pull "ghcr.io/blouin-labs/${service}:staging"
                docker tag  "ghcr.io/blouin-labs/${service}:staging" \
                            "ghcr.io/blouin-labs/${service}:latest"
                docker push "ghcr.io/blouin-labs/${service}:latest"
              done

  runner:
    uses: ./.github/workflows/select-runner.yml

  deploy:
    runs-on: ${{ fromJson(needs.runner.outputs.runner) }}
    needs: [promote, runner]
    # Runs for promote-and-deploy (after promote succeeds) and deploy (promote skipped).
    if: |
      always() &&
      (inputs.action == 'promote-and-deploy' || inputs.action == 'deploy') &&
      (needs.promote.result == 'success' || needs.promote.result == 'skipped') &&
      needs.runner.result == 'success'
    steps:
      - name: Require confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "ok deploy" ]; then
            echo 'ERROR: type "ok deploy" in the confirm field to proceed' >&2
            exit 1
          fi

      - uses: actions/checkout@v5
        with:
          ref: staging

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GH_COMPOSE_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H harbor-srv >> ~/.ssh/known_hosts 2>/dev/null || \
            ssh-keyscan -H 192.168.1.5 >> ~/.ssh/known_hosts

      - name: Rsync stacks to server
        # No --delete: files are only added/updated, never removed. Persistent data
        # directories (data/, keys/, db/) and .env files stay on the server untouched.
        run: |
          rsync -av \
            --exclude='data/' \
            --exclude='keys/' \
            --exclude='db/' \
            --exclude='*.db' \
            --exclude='.env' \
            stacks/ compose-deploy@harbor-srv:/mnt/synology/harbor_srv/docker/

      - name: Start/update stacks
        run: |
          cat > /tmp/deploy.sh << 'EOF'
          #!/usr/bin/env bash
          set -eo pipefail
          find /mnt/synology/harbor_srv/docker -maxdepth 2 \
            \( -name 'compose.yaml' -o -name 'docker-compose.yml' \) \
            | sort \
            | while IFS= read -r compose_file; do
              echo ":: $compose_file"
              docker compose -f "$compose_file" pull --quiet || true
              docker compose -f "$compose_file" up -d
          done
          EOF
          ssh compose-deploy@harbor-srv bash -s < /tmp/deploy.sh
