---
name: Build

on:
  push:
    branches: [staging]
    paths:
      - 'stacks/**'

permissions:
  contents: read
  packages: write

jobs:
  discover:
    runs-on: self-hosted
    container:
      image: alpine/git
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover services with Dockerfiles
        id: scan
        run: |
          services=$(find stacks/ -maxdepth 2 -name 'Dockerfile' \
            | sed 's|stacks/||; s|/Dockerfile||' \
            | jq -R . | jq -sc .)
          echo "matrix=${services}" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '[]' }}
    runs-on: self-hosted
    container:
      image: docker:dind
      options: --privileged
      env:
        DOCKER_TLS_CERTDIR: ""
    strategy:
      matrix:
        service: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Docker daemon
        run: |
          until docker info >/dev/null 2>&1; do sleep 1; done

      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push ${{ matrix.service }}
        env:
          SERVICE: ${{ matrix.service }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          docker buildx build --push \
            -t "ghcr.io/blouin-labs/${SERVICE}:${SHORT_SHA}" \
            -t "ghcr.io/blouin-labs/${SERVICE}:staging" \
            "stacks/${SERVICE}"

      - name: Write build summary
        env:
          SERVICE: ${{ matrix.service }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          | Field | Value |
          |---|---|
          | Service | \`${SERVICE}\` |
          | SHA tag | \`${SHORT_SHA}\` |
          | Image | \`ghcr.io/blouin-labs/${SERVICE}:staging\` |
          | Commit | \`${SHA}\` |
          | Built at | \`$(date -u)\` |
          EOF
