services:
  claude-rc:
    image: ghcr.io/blouin-labs/claude-rc:latest
    container_name: claude-rc
    restart: unless-stopped
    env_file: .env
    volumes:
      - /mnt/synology/harbor_srv/docker/claude-rc/workspace:/workspace
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'claude remote-control' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
