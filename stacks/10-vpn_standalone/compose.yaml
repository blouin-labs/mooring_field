---
services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8888:8888/tcp   # HTTP proxy
      - 8388:8388/tcp   # Shadowsocks (encrypted proxy, TCP)
      - 8388:8388/udp   # Shadowsocks (encrypted proxy, UDP)
      - 8112:8112       # Deluge Web UI
      - 6881:6881       # BitTorrent DHT/peer discovery (TCP)
      - 6881:6881/udp   # BitTorrent DHT/peer discovery (UDP)
      - 58846:58846     # Deluge daemon (for remote access via thin client)
    env_file: .env
    environment:
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/providers/nordvpn.md
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=openvpn
      - TZ=America/New_York
      # - SERVER_COUNTRIES=
      # - SERVER_REGIONS=
      # - SERVER_CITIES=
      # - SERVER_HOSTNAMES=
      # - SERVER_CATEGORIES=
    volumes:
      - /volume1/Synology/Gluetun:/gluetun

# Connecting containers to gluetun:
#   - In the same compose file: use network_mode: "service:gluetun"
#   - In a separate compose file: use network_mode: "container:gluetun"
